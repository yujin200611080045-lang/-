<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五子棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 4px;
    color: #333;
    margin-bottom: 16px;
  }
  #status {
    font-size: 14px;
    color: #666;
    margin-bottom: 12px;
    height: 20px;
    letter-spacing: 1px;
  }
  #board-wrap {
    position: relative;
    background: #d4a96a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-radius: 4px;
  }
  canvas {
    display: block;
    border-radius: 4px;
  }
  #controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
  }
  button {
    padding: 10px 24px;
    border: 1px solid #333;
    background: transparent;
    color: #333;
    font-size: 13px;
    letter-spacing: 2px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:active {
    background: #333;
    color: #f5f0e8;
  }
  #winner-mask {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  #winner-mask.show { display: flex; }
  #winner-text {
    font-size: 28px;
    color: #fff;
    letter-spacing: 4px;
    font-weight: 300;
  }
  #winner-mask button {
    border-color: #fff;
    color: #fff;
    font-size: 14px;
  }
  #winner-mask button:active {
    background: #fff;
    color: #333;
  }
</style>
</head>
<body>
<h1>五 子 棋</h1>
<div id="status">黑方先行</div>
<div id="board-wrap">
  <canvas id="board"></canvas>
</div>
<div id="controls">
  <button onclick="resetGame()">重新开始</button>
  <button onclick="undoMove()">悔棋</button>
</div>

<div id="winner-mask">
  <div id="winner-text"></div>
  <button onclick="resetGame()">再来一局</button>
</div>

<script>
  const GRID = 15;
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');

  let SIZE, CELL, PAD;
  let board = [];
  let current = 1;
  let history = [];
  let gameOver = false;

  function resize() {
    const max = Math.min(window.innerWidth - 32, window.innerHeight - 200, 480);
    SIZE = max;
    CELL = SIZE / (GRID + 1);
    PAD = CELL;
    canvas.width = SIZE;
    canvas.height = SIZE;
    canvas.style.width = SIZE + 'px';
    canvas.style.height = SIZE + 'px';
    draw();
  }

  function initBoard() {
    board = Array.from({length: GRID}, () => Array(GRID).fill(0));
    current = 1;
    history = [];
    gameOver = false;
    document.getElementById('status').textContent = '黑方先行';
    document.getElementById('winner-mask').classList.remove('show');
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    ctx.fillStyle = '#d4a96a';
    ctx.fillRect(0, 0, SIZE, SIZE);

    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 0.8;
    for (let i = 0; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(PAD + i * CELL, PAD);
      ctx.lineTo(PAD + i * CELL, PAD + (GRID - 1) * CELL);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(PAD, PAD + i * CELL);
      ctx.lineTo(PAD + (GRID - 1) * CELL, PAD + i * CELL);
      ctx.stroke();
    }

    const stars = [3, 7, 11];
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    for (let r of stars) {
      for (let c of stars) {
        ctx.beginPath();
        ctx.arc(PAD + c * CELL, PAD + r * CELL, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        if (board[r][c]) drawPiece(r, c, board[r][c]);
      }
    }
  }

  function drawPiece(r, c, player) {
    const x = PAD + c * CELL;
    const y = PAD + r * CELL;
    const radius = CELL * 0.45;
    const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
    if (player === 1) {
      grad.addColorStop(0, '#666');
      grad.addColorStop(1, '#111');
    } else {
      grad.addColorStop(0, '#fff');
      grad.addColorStop(1, '#ccc');
    }
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let cx, cy;
    const touch = e.changedTouches ? e.changedTouches[0] : null;
    if (touch) {
      cx = (touch.clientX - rect.left) * scaleX;
      cy = (touch.clientY - rect.top) * scaleY;
    } else {
      cx = (e.clientX - rect.left) * scaleX;
      cy = (e.clientY - rect.top) * scaleY;
    }
    const c = Math.round((cx - PAD) / CELL);
    const r = Math.round((cy - PAD) / CELL);
    return { r, c };
  }

  function placeStone(e) {
    e.preventDefault();
    if (gameOver) return;
    const {r, c} = getPos(e);
    if (r < 0 || r >= GRID || c < 0 || c >= GRID) return;
    if (board[r][c]) return;
    board[r][c] = current;
    history.push({r, c, player: current});
    draw();
    if (checkWin(r, c, current)) {
      gameOver = true;
      const name = current === 1 ? '黑方' : '白方';
      document.getElementById('winner-text').textContent = name + ' 胜利';
      document.getElementById('winner-mask').classList.add('show');
      return;
    }
    current = current === 1 ? 2 : 1;
    document.getElementById('status').textContent = current === 1 ? '黑方落子' : '白方落子';
  }

  function checkWin(r, c, player) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let count = 1;
      for (let i = 1; i < 5; i++) {
        const nr = r + dr*i, nc = c + dc*i;
        if (nr<0||nr>=GRID||nc<0||nc>=GRID||board[nr][nc]!==player) break;
        count++;
      }
      for (let i = 1; i < 5; i++) {
        const nr = r - dr*i, nc = c - dc*i;
        if (nr<0||nr>=GRID||nc<0||nc>=GRID||board[nr][nc]!==player) break;
        count++;
      }
      if (count >= 5) return true;
    }
    return false;
  }

  function undoMove() {
    if (gameOver || history.length === 0) return;
    const last = history.pop();
    board[last.r][last.c] = 0;
    current = last.player;
    document.getElementById('status').textContent = current === 1 ? '黑方落子' : '白方落子';
    draw();
  }

  function resetGame() { initBoard(); }

  canvas.addEventListener('touchend', placeStone, { passive: false });
  canvas.addEventListener('click', placeStone);
  window.addEventListener('resize', resize);

  resize();
  initBoard();
</script>
</body>
</html>
